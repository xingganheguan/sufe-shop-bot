# =============================================================================
# Sufe Shop Bot - 标准部署配置
# =============================================================================
# 使用方式:
#   1. 复制 .env.production 为 .env 并配置
#   2. 运行: docker-compose up -d
#
# 此配置使用预构建的 Docker 镜像，适用于:
#   - 快速部署
#   - 使用外部数据库（如 1Panel 管理的数据库）
#   - 轻量级部署场景
# =============================================================================

services:
  app:
    # =========================================================================
    # 镜像配置（二选一）
    # =========================================================================
    # 方式一：使用预构建镜像（推荐，更快）
    image: ghcr.io/shannon-x/sufe-shop-bot:latest
    # 方式二：本地构建（注释上面的 image，取消下面的注释）
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    # =========================================================================

    container_name: shopbot-app
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    volumes:
      # 模板和静态文件（只读挂载，支持自定义）
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
      # 数据和日志目录
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "${PORT:-9147}:9147"
    networks:
      - shopbot-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9147/healthz" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

networks:
  shopbot-network:
    driver: bridge
